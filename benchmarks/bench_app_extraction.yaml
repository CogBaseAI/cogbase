name: PLACEHOLDER

query_prompt: |
  You are a document Q&A assistant. Answer each question using retrieved evidence only.

  Entity-relation triples are available as a structured index over the corpus.
  Use them to orient your search — identify relevant entities and relationships —
  then retrieve the supporting passage or summary context before answering.
  Do not answer from triples alone.

  Answer style:
  - Provide a concise factual answer.
  - State the answer directly and clearly.
  - No preamble ("Based on the documents…", "According to the text…").
  - Do not invent facts not found in the retrieved evidence.

vector_collections:
- name: novel_passages
  dimensions: 1536
  description: Overlapping passages from a novel for semantic search and question answering.
  metadata_fields: []

structured_collections:
- name: novel_claims_relations
  description: Capturing explicit and implied claims, comparisons, and relationships between entities.
  schema: '{"type":"object","properties":{"subject_entity":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"The subject entity involved in the claim or relation"},"subject_type":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Type of the subject entity such as person, place, group, event, object, or concept"},"relation_type":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Type of relation such as related_to, lives_in, travels_to, loves, hates, works_for, belongs_to, causes, compares_to, mentions, or opposes"},"object_entity":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"The object entity involved in the claim or relation"},"object_type":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Type of the object entity such as person, place, group, event, object, or concept"},"claim_text":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Verbatim supporting text for the claim or relation"},"evidence_type":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Whether the relation is explicit, implied, or inferred from the text"},"note":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Optional clarification or context for the claim or relation"},"claim_id":{"type":"string","description":"record identifier"},"doc_id":{"type":"string","description":"document identifier"}},"required":["doc_id","claim_id"]}'
  primary_fields:
  - doc_id
  - claim_id

pipelines:
- name: novel
  routing_description: Novel manuscripts, published novels, and novel front matter or body text for question answering.
  parallel: false
  steps:
  - collection: novel_passages
    tool: chunk-embed-upsert

  - collection: novel_claims_relations
    tool: extract-structured
    extractor:
      type: llm
      extraction_schema: '{"type":"object","properties":{"subject_entity":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"The subject entity involved in the claim or relation"},"subject_type":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Type of the subject entity such as person, place, group, event, object, or concept"},"relation_type":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Type of relation such as related_to, lives_in, travels_to, loves, hates, works_for, belongs_to, causes, compares_to, mentions, or opposes"},"object_entity":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"The object entity involved in the claim or relation"},"object_type":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Type of the object entity such as person, place, group, event, object, or concept"},"claim_text":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Verbatim supporting text for the claim or relation"},"evidence_type":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Whether the relation is explicit, implied, or inferred from the text"},"note":{"anyOf":[{"type":"string"},{"type":"null"}],"description":"Optional clarification or context for the claim or relation"}}}'
      prompt: 'You are a literary analyst. Extract distinct claims, comparisons, and relationships from the novel.

        Return ONLY the JSON object — no explanation, no markdown fences.'
      record_mode: many
      response_field: items
      id_field: claim_id
      id_template: '{doc_id}__{index:04d}'
skills: []
workflows: []
