# Example CogBase application config (config.yaml inside your ZIP bundle)
#
# Bundle structure:
#   my_app.zip
#   ├── config.yaml               (this file)
#   ├── extraction_schema.json    (JSON Schema for structured extraction)
#   └── extraction_prompt.txt     (optional LLM system prompt prefix)
#
# POST the ZIP to POST /applications to create an application.
#
# Required: name, llm
# Optional: embedding (required when chunk_collections or document_collections are defined)
#
# Store backends (structured_store, vector_store) are not set here —
# the service automatically uses the stores defined in cogbase_system.yaml.

name: my-contract-analyzer

llm:
  provider: openai           # only "openai" supported today
  model: gpt-4o-mini
  # api_key: sk-...          # omit to use OPENAI_API_KEY env var

embedding:                   # shared across all vector and summarize collections
  provider: openai
  model: text-embedding-3-small
  # dimensions: 512          # optional: truncate to smaller vectors

chunk_collections:
  - name: document_chunks    # full-text passage index
    chunker:
      type: fixed            # fixed | langchain
      chunk_size: 512
      overlap: 64

structured_collections:
  - name: contract_extraction
    schema: extraction_schema.json      # filename in ZIP root (resolved at upload time)
    extractor:
      type: llm
      prompt: extraction_prompt.txt     # filename in ZIP root; omit to use built-in default

document_collections:
  - name: document_summary   # one vector record per document (LLM summary embedded)
    prompt: "Summarize this document in a few sentences."
    max_tokens: 1024
    # metadata_fields: [customer_id, deal_stage]  # optional: project doc.metadata keys into chunk metadata for search filtering

pipeline:
  parallel: false            # steps run sequentially top-to-bottom
  steps:
    - tool: chunk-embed-upsert
      collection: document_chunks

    - tool: extract-structured
      collection: contract_extraction

    - tool: document-embed-upsert
      collection: document_summary
