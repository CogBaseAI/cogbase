# Example CogBase application config
# POST this file to /applications to create an application.
#
# Required: name, llm
# Optional: embedding + chunker (both or neither)
#
# Store backends (structured_store, vector_store) are not set here —
# the service automatically uses the stores defined in cogbase_system.yaml.
# The application's collections are namespaced under its name automatically.

name: my-contract-analyzer

llm:
  provider: openai           # only "openai" supported today
  model: gpt-5-mini
  # api_key: sk-...          # omit to use OPENAI_API_KEY env var

embedding:                   # remove this section for structured-only mode
  provider: openai
  model: text-embedding-3-small
  # dimensions: 512          # optional: truncate to smaller vectors

chunker:                     # remove this section for structured-only mode
  type: fixed                # fixed | langchain
  chunk_size: 512
  overlap: 64
