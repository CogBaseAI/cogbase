# Example CogBase application config (config.yaml inside your ZIP bundle)
#
# Bundle structure:
#   my_app.zip
#   ├── config.yaml                         (this file)
#   ├── contract_record_schema.json         (JSON Schema for the stored record — includes identity fields)
#   ├── contract_extraction_schema.json     (JSON Schema for what the LLM extracts — no identity fields)
#   └── extraction_prompt.txt               (optional LLM system prompt prefix)
#
# POST the ZIP to POST /applications to create an application.
#
# Required: name
# Optional:
#   - llm, if you need a llm different than system llm
#   - embedding, if you need an embedding model different than system embedding model
#
# Optional: Store backends (structured_store, vector_store) are not set here —
# the service automatically uses the stores defined in cogbase_system.yaml.

name: my-contract-analyzer

vector_collections:
  - name: document_chunks    # full-text passage index
    description: "Full-text document chunks for detailed retrieval."
    # metadata_fields: [customer_id, deal_stage]  # optional: project doc.metadata keys into chunk metadata
  - name: document_summary   # one vector record per document (LLM summary embedded)
    description: "One-per-document summaries; use for topic-level or high-level questions about what documents cover."

structured_collections:
  - name: contract_extraction
    description: "Extracted contract facts and entities for exact lookup."
    schema: contract_record_schema.json         # record schema — includes doc_id and any other identity fields
    primary_fields: [doc_id]

pipeline:
  parallel: true             # steps run in parallel where possible
  steps:
    - tool: chunk-embed-upsert
      collection: document_chunks
      chunker:
        type: fixed          # fixed | langchain
        chunk_size: 512
        overlap: 64

    - tool: extract-structured
      collection: contract_extraction
      extractor:
        type: llm
        extraction_schema: contract_extraction_schema.json  # what the LLM extracts — no identity fields
        prompt: extraction_prompt.txt                       # filename in ZIP root; omit to use built-in default

    - tool: document-embed-upsert
      collection: document_summary
      doc_prompt: "Summarize this document in a concise way, focusing on the most important points and avoiding unnecessary detail."

