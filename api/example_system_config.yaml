# CogBase system configuration
#
# Place this file at ./cogbase_system.yaml or point to it with:
#   COGBASE_CONFIG=/path/to/cogbase_system.yaml
#
# All fields are optional.  When omitted, in-memory stores are used and
# data is lost when the service restarts.

# Store backend for the application registry (CogBase's own metadata).
# Supports the same backends as application stores: sqlite, postgres, or memory.
# When absent, falls back to the COGBASE_SYSTEM_DB env var (SQLite path) or
# ./cogbase_system.db.
system_db:
  type: sqlite                       # sqlite | postgres | memory
  path: ./data/cogbase_system.db     # required for sqlite
  # type: postgres
  # url: postgresql://user:pass@localhost:5432/cogbase   # required for postgres

# Shared structured store — all applications write their collections here.
# Each application gets its own namespace (prefix) so collections never
# collide, even when multiple applications share this backend.
structured_store:
  type: sqlite                  # sqlite | postgres | memory
  path: ./data/cogbase.db       # required for sqlite
  # type: postgres
  # url: postgresql://user:pass@localhost:5432/cogbase   # required for postgres

# Vector store settings — a fresh instance of this type is created for each
# application that has embedding + chunker configured.
# Remove this section to run all applications in structured-only mode.
vector_store:
  type: faiss                   # faiss | pgvector
  path: ./data/faiss_vector_store # optional for faiss; defaults to a temp directory
  # type: pgvector
  # url: postgresql://user:pass@localhost:5432/cogbase   # required for pgvector

# Default document store settings for storing full document text by doc_id.
# Use this when applications do not provide their own document_store config.
document_store:
  type: local                   # local | s3
  path: ./data/documents        # required for local
  # type: s3
  # bucket: my-cogbase-docs     # required for s3
  # prefix: app-documents       # optional
  # region: us-west-2           # optional

# Append-only log store backing episodic memory (per-session event logs).
# Remove this section to run without durable episodic memory.
log_store:
  type: local                   # local | s3
  path: ./data/logs             # required for local
  # type: s3
  # bucket: my-cogbase-logs     # required for s3 (directory bucket)
  # prefix: app-logs            # optional
  # region: us-west-2           # optional

llm:
  provider: openai           # "openai" | "openai-compatible"
  model: gpt-5.4-mini
  mini_model: gpt-5.4-mini
  api_key: sk-xxx

  # OpenAI-compatible providers (vLLM, Alibaba DashScope, etc.):
  # provider: openai-compatible
  # model: gpt-5.4-mini
  # mini_model: gpt-5.4-mini
  # base_url: http://localhost:8000/v1          # vLLM
  # base_url: https://dashscope.aliyuncs.com/compatible-mode/v1  # Alibaba
  # api_key: sk-xxx

embedding:                   # shared across all vector and summarize collections
  provider: openai           # "openai" | "openai-compatible" | "sentence-transformers"
  model: text-embedding-3-small
  dimensions: 1536
  api_key: sk-xxx

  # OpenAI-compatible embedding providers (vLLM, Alibaba DashScope, etc.):
  # provider: openai-compatible
  # model: text-embedding-v3
  # dimensions: 1536
  # base_url: http://localhost:8000/v1                              # vLLM
  # base_url: https://dashscope.aliyuncs.com/compatible-mode/v1   # Alibaba
  # api_key: sk-xxx
