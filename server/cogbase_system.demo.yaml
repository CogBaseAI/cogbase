system_db:
  type: sqlite
  path: /data/cogbase_system.db

structured_store:
  type: sqlite
  path: /data/cogbase.db

vector_store:
  type: faiss
  path: /data/faiss_vector_store

document_store:
  type: local
  path: /data/documents

log_store:
  type: local
  path: /data/logs

# Built-in ("default") skills shipped with CogBase. Loaded on startup as
# read-only skills and surfaced in the UI Skills tab. This is the in-image
# path (the repo is copied to /app), so it needs no mounted volume.
skills_dir: /app/skills

# LLM and embedding are not pre-configured — set them via the UI Settings tab,
# or add the blocks below (with a valid api_key):
# llm:
#   provider: openai           # "openai" | "openai-compatible"
#   model: gpt-5.4
#   mini_model: gpt-5.4-mini
#   base_url: https://api.openai.com/v1
#   api_key: sk-xxx

# embedding:
#   provider: openai           # "openai" | "openai-compatible"
#   model: text-embedding-3-small
#   dimensions: 1536
#   base_url: https://api.openai.com/v1
#   api_key: sk-xxx
