system_db:
  type: sqlite
  path: /data/cogbase_system.db

structured_store:
  type: sqlite
  path: /data/cogbase.db

vector_store:
  type: faiss
  path: /data/faiss_vector_store

document_store:
  type: local
  path: /data/documents

# LLM and embedding are not pre-configured — set them via the UI Settings tab,
# or add the blocks below (with a valid api_key):
# llm:
#   provider: openai
#   model: gpt-5.4
#   mini_model: gpt-5.4-mini
#   api_key: sk-xxx

# embedding:
#   provider: openai
#   model: text-embedding-3-small
#   api_key: sk-xxx

