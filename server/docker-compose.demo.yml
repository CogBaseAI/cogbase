services:
  cogbase:
    build:
      context: ..
      dockerfile: server/Dockerfile.demo
    image: cogbase-demo:latest
    ports:
      - "8000:8000"
    environment:
      - COGBASE_CONFIG=/app/server/cogbase_system.demo.yaml
      # Passed through only when set in the host environment; omit to configure via UI Settings.
      - OPENAI_API_KEY
    volumes:
      - ../data:/data
